parameters:
  # One or more root folders to scan for Streamlit apps. Each entry can be
  # a folder containing category subfolders (SUPPORT, Test, ...) which in
  # turn contain app folders, at any nesting depth - the deploy step finds
  # every snowflake.yml underneath automatically.
  # Override at the pipeline/template call site, e.g.:
  #   parameters:
  #     streamlitBaseDirs:
  #       - database/snowflake/coEDW/Streamlit_Apps
  #       - database/snowflake/otherDW/Streamlit_Apps
  - name: streamlitBaseDirs
    type: object
    default:
      - database/snowflake/coEDW/Streamlit_Apps

steps:
- checkout: self

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.9.5'
    disableDownloadFromRegistry: true
    addToPath: true
    architecture: 'x64'
  displayName: 'Set Python Version to 3.9.5'

- script: |
    echo "[INFO] Updating pip..."
    python -m pip install --upgrade pip

    echo "[INFO] Installing Snowflake CLI..."
    pip install snowflake-cli

    echo "[INFO] Verifying Snowflake CLI installation..."
    snow --version
  displayName: 'Install Snowflake CLI'

- bash: |
    mkdir -p ~/.snowflake

    cat > ~/.snowflake/config.toml <<EOF
    default_connection_name = "ci"

    [connections.ci]
    account = "$(SNOWFLAKE_ACCOUNT)"
    user = "$(SNOWFLAKE_USER)"
    password = "$(SNOWFLAKE_PASSWORD)"
    warehouse = "$(SNOWFLAKE_WAREHOUSE)"
    role = "$(SNOWFLAKE_ROLE)"
    EOF

    chmod 700 ~/.snowflake
    chmod 600 ~/.snowflake/config.toml
  displayName: 'Configure Snowflake Connection'
  env:
    SNOWFLAKE_ACCOUNT: $(SNOWFLAKE_ACCOUNT)
    SNOWFLAKE_USER: $(SNOWFLAKE_USER)
    SNOWFLAKE_PASSWORD: $(SNOWFLAKE_PASSWORD)
    SNOWFLAKE_WAREHOUSE: $(SNOWFLAKE_WAREHOUSE)
    SNOWFLAKE_ROLE: $(SNOWFLAKE_ROLE)

- bash: |
    set -e

    deployFailed=0
    appCount=0

    for BASE_DIR in $STREAMLIT_BASE_DIRS; do
      if [ ! -d "$BASE_DIR" ]; then
        echo "[WARN] $BASE_DIR not found - skipping (check the path relative to the repo root)."
        continue
      fi

      echo "[INFO] Scanning $BASE_DIR for Streamlit apps (any category, any depth)..."

      # Recursively find every snowflake.yml under this base dir - this works
      # no matter how many category folders (SUPPORT, Test, ...) or nesting
      # levels exist, without needing to list them explicitly.
      while IFS= read -r -d '' manifest; do
        appDir=$(dirname "$manifest")
        appName=$(basename "$appDir")
        categoryName=$(basename "$(dirname "$appDir")")
        appCount=$((appCount + 1))

        echo "----------------------------------------"
        echo "[INFO] Deploying Streamlit app: $BASE_DIR -> $categoryName/$appName"
        echo "----------------------------------------"

        pushd "$appDir" > /dev/null
        if snow streamlit deploy --replace -c ci; then
          echo "[INFO] Successfully deployed $categoryName/$appName"
        else
          echo "[ERROR] Failed to deploy $categoryName/$appName"
          deployFailed=1
        fi
        popd > /dev/null
      done < <(find "$BASE_DIR" -type f -name "snowflake.yml" -print0)
    done

    if [ "$appCount" -eq 0 ]; then
      echo "[WARN] No snowflake.yml files found under any of: $STREAMLIT_BASE_DIRS - nothing was deployed."
    fi

    if [ "$deployFailed" -ne 0 ]; then
      echo "[ERROR] One or more Streamlit app deployments failed."
      exit 1
    fi

    echo "[INFO] All $appCount Streamlit app(s) deployed successfully."
  displayName: 'Deploy Streamlit Apps'
  env:
    STREAMLIT_BASE_DIRS: ${{ join(' ', parameters.streamlitBaseDirs) }}
