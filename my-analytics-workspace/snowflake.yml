definition_version: 2
entities:
  # This acts as a reusable dynamic template
  streamlit_app:
    type: streamlit
    identifier:
      name: <% env.APP_NAME %>
      database: DEV_BI_DB
      schema: STREAMLIT_SCHEMA
    query_warehouse: ANALYTICS_WH
    main_file: apps/<% env.APP_FOLDER %>/main.py
    artifacts:
      - src: apps/<% env.APP_FOLDER %>/main.py
        dest: main.py
      - src: apps/<% env.APP_FOLDER %>/environment.yml
        dest: environment.yml
